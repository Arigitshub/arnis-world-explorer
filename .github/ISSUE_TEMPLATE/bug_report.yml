name: Bug report
description: Report a broken behavior in the viewer
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include whether you opened the page from disk or through a local server.
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: Chrome 135, Edge 134, Firefox 137
  - type: textarea
    id: logs
    attributes:
      label: Console errors
      description: Paste any browser console errors here.

